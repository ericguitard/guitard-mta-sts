<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Redirecting to guitard.ca</title>

  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://guitard.ca/">
  <meta http-equiv="refresh" content="0; url=https://guitard.ca/">

  <script>
    window.location.replace("https://guitard.ca/");
  </script>
</head>
<body>
  <main>
    <h1>Redirecting to guitard.ca</h1>
    <p>
      If the redirect does not happen automatically,
      <a href="https://guitard.ca/" rel="canonical">continue to guitard.ca</a>.
    </p>

    <noscript>
      <p>JavaScript is disabled, but you can still use the link above.</p>
    </noscript>
  </main>
</body>
</html>
